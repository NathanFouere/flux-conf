apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strategia
  namespace: strategia
spec:
  releaseName: strategia
  chart:
    spec:
      chart: strategia
      version: "0.1.1"
      sourceRef:
        kind: HelmRepository
        name: strategia
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    server:
      image:
        repository: nathanfouere/strategia-server
        pullPolicy: IfNotPresent
        tag: "latest"
      service:
        type: ClusterIP
        port: 8080
        targetPort: 8080
      config:
        httpPort: "8080"
        timeBetweenGame: "10"
        tickerMainMenuSeconds: "1"
        tickerUpdateGameMs: "50"
        gameStartDelaySec: "10"
    client:
      image:
        repository: nathanfouere/strategia-client
        pullPolicy: IfNotPresent
        tag: "latest"
      service:
        type: ClusterIP
        port: 3000
        targetPort: 3000
